services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 30

  core-api:
    build:
      context: ./services/core-api
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/app
      REQUIRES_APPROVAL_DEFAULT: "true"
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  agent-orchestrator:
    build:
      context: ./services/agent-orchestrator
    environment:
      CORE_API_BASE_URL: http://core-api:8000
      LOG_LEVEL: info
    ports:
      - "8001:8001"
    depends_on:
      core-api:
        condition: service_started

  model-server:
    build:
      context: ./services/model-server
    environment:
      LOG_LEVEL: info
    ports:
      - "8002:8002"

  rag-service:
    build:
      context: ./services/rag-service
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/app
      LOG_LEVEL: info
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build:
      context: ./apps/ui
    environment:
      CORE_API_BASE_URL: http://core-api:8000
      AGENT_API_BASE_URL: http://agent-orchestrator:8001
    ports:
      - "3000:3000"
    depends_on:
      core-api:
        condition: service_started
      agent-orchestrator:
        condition: service_started

volumes:
  pg_data:

